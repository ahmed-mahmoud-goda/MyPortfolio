<section class="bg-black min-h-[calc(100dvh-128px)] py-20 md:px-8 px-4 flex items-center justify-center">

  <div class="w-full max-w-6xl">

    <div class="text-center mb-12">
      <h2 class="text-white text-3xl sm:text-4xl font-bold mb-2">My Skills</h2>
      <p class="text-gray-500 text-sm sm:text-base">
        Technologies and tools I use to build scalable applications
      </p>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">

      @for (skill of skills; track skill.title) {
        <div class="bg-[#0a0a0a] border border-green-500/10 rounded-xl p-5 transition-all duration-300 ease-out hover:-translate-y-2 hover:scale-[1.02] hover:border-green-400/40 hover:shadow-[0_0_30px_rgba(34,197,94,0.25)]">

  <h3 class="text-green-400 font-semibold mb-3">
    {{ skill.title }}
  </h3>

  <p class="text-gray-400 text-sm leading-relaxed">
    {{ skill.items }}
  </p>

        </div>
      }

    </div>

  </div>

</section>
