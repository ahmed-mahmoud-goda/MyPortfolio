<nav class="fixed top-0 inset-x-0 z-50 h-16 bg-black flex justify-between items-center px-6">

  <a (click)="close()" routerLink="/" >
    <img src="logo.png" alt="logo" class="h-10 w-auto">
  </a>

  <button (click)="toggle()"class="md:hidden text-white text-2xl z-60"
    aria-label="Menu"
  >
    {{ open() ? '✕' : '☰' }}
  </button>

  <ul
    class="flex gap-6 list-none m-0 p-0
           max-md:fixed max-md:top-0 max-md:right-0 max-md:h-screen max-md:w-64
           max-md:flex-col max-md:bg-black/90 max-md:pt-20 max-md:px-6
           max-md:transition-transform"
    [class.max-md:translate-x-full]="!open()"
  >
    @for (p of pages; track p.label) {
      <li>
        <a
  (click)="close()"
  [routerLink]="p.path"
  routerLinkActive="text-white opacity-100 font-semibold"
  [routerLinkActiveOptions]="{ exact: true }"
  class="text-gray-400 hover:text-white transition"
>
  {{ p.label }}
        </a>
      </li>
    }
  </ul>

</nav>
